<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>ogrenci tablo</title>
</head>
<style>
  *{
    padding: 5px;
  }
  table, th, td {
  border: 1px solid gray;
  }
</style>
<body>
  
  <div id="TABLOID">tabloyeri</div>

<form class="tablo-form" id="tablo-form">

  <div class="form-row">
    <div class="form-group">
      <label for="OGRENCI-AD">İsim: </label>
      <input type="text" id="OGRENCI-AD" name="OGRENCI-AD" minlength="2" maxlength="50" placeholder="John">
      <!--<span class="error-message"></span>-->
    </div>

    <div class="form-group">
      <label for="OGRENCI-SOYAD">Soy İsim: </label>
      <input type="text" id="OGRENCI-SOYAD" name="OGRENCI-SOYAD" minlength="2" maxlength="50" placeholder="Doe">
      <!--<span class="error-message"></span>-->
    </div>
  
    <div class="form-group">
      <label for="OGRENCI-NO">Numara: </label>
      <input type="number" id="OGRENCI-NO" name="OGRENCI-NO" min="0" placeholder="150123001">
      <!--<span class="error-message"></span>-->
  </div>
  
    <div class="form-group">
      <label for="OGRENCI-BOLUM">Bölüm: </label>
      <input type="text" id="OGRENCI-BOLUM" name="OGRENCI-BOLUM" placeholder="Mühendislik Mühendisliği">
      <!--<span class="error-message"></span>-->
    </div>

    <div class="form-group">
      <label for="OGRENCI-YAS">Yaş: </label>
      <input type="text" id="OGRENCI-YAS" name="OGRENCI-YAS" placeholder="20">
      <!--<span class="error-message"></span>-->
    </div>
  </div>
  
  <button type="submit" class="submit-btn" id="ogrenciEkleBtn">Öğrenci Ekle</button>

</form>

<div style="margin: 60px;" id="result">Error: </div>
<div style="margin: 60px;" id="result2">Mesaj: </div>
<div style="margin: 60px;" id="result3">Mesaj: </div>
<div style="margin: 60px;" id="result4">Mesaj: </div>

<script src="js/script.js"></script>
</body>
